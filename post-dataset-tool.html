<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Dataset Manager</title>
<style>
/* ========== Global ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #f5f6fa; --card-bg: #ffffff; --primary: #4f6ef6; --primary-hover: #3b5de7;
    --danger: #e74c3c; --danger-hover: #c0392b; --text: #2c3e50; --text-secondary: #7f8c8d;
    --border: #e1e5ea; --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.10); --radius: 10px; --transition: 0.2s ease;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
}

/* ========== Header ========== */
.header {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
.header-title .icon { font-size: 1.5rem; }
.header-stats { font-size: 0.85rem; color: var(--text-secondary); background: var(--bg); padding: 6px 14px; border-radius: 20px; font-weight: 500; }

/* ========== Layout ========== */
.main-container {
    display: flex; gap: 24px; padding: 24px 32px; max-width: 1400px;
    margin: 0 auto; min-height: calc(100vh - 140px);
}

/* ========== Left: Post List ========== */
.list-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }
.search-bar { display: flex; gap: 10px; }
.search-bar input {
    flex: 1; padding: 10px 16px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 0.95rem; outline: none; transition: border-color var(--transition); background: var(--card-bg);
}
.search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 110, 246, 0.1); }
.search-bar select {
    padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 0.9rem; background: var(--card-bg); outline: none; cursor: pointer; color: var(--text);
}

.post-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; padding-right: 4px; }
.post-list::-webkit-scrollbar { width: 6px; }
.post-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

/* ========== Post Card ========== */
.post-card {
    background: var(--card-bg); border: 2px solid transparent; border-radius: var(--radius);
    padding: 16px 20px; cursor: pointer; transition: all var(--transition); box-shadow: var(--shadow); position: relative;
}
.post-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
.post-card.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 110, 246, 0.12); }

.post-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
.post-card-title { font-size: 1rem; font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.post-card-time {
    font-size: 0.8rem; color: var(--primary); white-space: nowrap; font-weight: 500;
    background: rgba(79, 110, 246, 0.08); padding: 3px 10px; border-radius: 12px;
}
.post-card-meta { display: flex; gap: 16px; font-size: 0.82rem; color: var(--text-secondary); }
.post-card-preview { font-size: 0.85rem; color: var(--text-secondary); margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ========== Right: Edit Panel ========== */
.edit-panel {
    width: 420px; flex-shrink: 0; background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 24px; display: flex; flex-direction: column;
    gap: 20px; height: fit-content; position: sticky; top: 90px;
}
.panel-title { font-size: 1.1rem; font-weight: 700; color: var(--text); padding-bottom: 12px; border-bottom: 2px solid var(--bg); }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group textarea {
    padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color var(--transition);
    resize: vertical; background: var(--bg);
}
.form-group input:focus, .form-group textarea:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 110, 246, 0.08); background: var(--card-bg);
}
.form-group textarea { min-height: 160px; }

/* ========== Publish Time (core feature) ========== */
.time-edit-section {
    background: rgba(79, 110, 246, 0.04); border: 1px dashed var(--primary);
    border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px;
}
.time-edit-section .section-label {
    font-size: 0.8rem; font-weight: 700; color: var(--primary); text-transform: uppercase;
    letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px;
}
.time-display { font-size: 1.1rem; font-weight: 600; color: var(--text); }
.time-edit-row { display: flex; gap: 10px; align-items: center; }
.time-edit-row input[type="datetime-local"] {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.9rem; font-family: inherit; outline: none; background: var(--card-bg);
}
.time-edit-row input[type="datetime-local"]:focus { border-color: var(--primary); }
.btn-set-time {
    padding: 8px 16px; background: var(--primary); color: #fff; border: none;
    border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 600; white-space: nowrap;
    transition: background var(--transition);
}
.btn-set-time:hover { background: var(--primary-hover); }

/* ========== Buttons ========== */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
    padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem;
    cursor: pointer; font-weight: 600; transition: all var(--transition);
    display: flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: rgba(79, 110, 246, 0.06); }
.btn-danger { background: transparent; color: var(--danger); border: 2px solid var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; }

/* ========== Footer ========== */
.footer-bar {
    background: var(--card-bg); border-top: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
}
.footer-actions { display: flex; gap: 10px; align-items: center; }
.footer-info { font-size: 0.82rem; color: var(--text-secondary); }

/* ========== Toast ========== */
.toast {
    position: fixed; top: 24px; right: 24px; background: #2c3e50; color: #fff;
    padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; font-weight: 500;
    z-index: 9999; opacity: 0; transform: translateY(-10px);
    animation: toastIn 0.3s forwards, toastOut 0.3s 2.5s forwards; pointer-events: none;
}
@keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }

/* ========== Empty State ========== */
.empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 60px 20px; color: var(--text-secondary);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.empty-state h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }
.empty-state p { font-size: 0.9rem; }

/* ========== Confirm Modal ========== */
.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 200; display: flex;
    align-items: center; justify-content: center; animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
    background: var(--card-bg); border-radius: var(--radius); padding: 28px;
    max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center;
}
.modal-box h3 { margin-bottom: 12px; }
.modal-box p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem; }
.modal-box .btn-row { justify-content: center; }

/* ========== Responsive ========== */
@media (max-width: 900px) {
    .main-container { flex-direction: column; padding: 16px; }
    .edit-panel { width: 100%; position: static; }
    .header { padding: 12px 16px; }
    .footer-bar { padding: 12px 16px; flex-direction: column; align-items: flex-start; }
}
.hidden-input { display: none; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-title"><span class="icon">&#x1F4CA;</span><span>Post Dataset Manager</span></div>
    <div class="header-stats" id="headerStats">0 posts total</div>
</header>

<!-- Main -->
<div class="main-container">

    <!-- Left: Post List -->
    <div class="list-panel">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="&#x1F50D; Search title, author or content...">
            <select id="sortSelect">
                <option value="newest">Publish Time &#x2193; (Newest)</option>
                <option value="oldest">Publish Time &#x2191; (Oldest)</option>
                <option value="created">Created Time &#x2193;</option>
            </select>
        </div>
        <div class="post-list" id="postList">
            <div class="empty-state">
                <span class="icon">&#x1F4DD;</span>
                <h3>No posts yet</h3>
                <p>Create your first post in the right panel</p>
            </div>
        </div>
    </div>

    <!-- Right: Edit Panel -->
    <aside class="edit-panel" id="editPanel">
        <div class="panel-title" id="panelTitle">&#x270D;&#xFE0F; New Post</div>

        <div class="form-group">
            <label>Title</label>
            <input type="text" id="titleInput" placeholder="Enter post title...">
        </div>

        <div class="form-group">
            <label>Author</label>
            <input type="text" id="authorInput" placeholder="Enter author name...">
        </div>

        <div class="form-group">
            <label>Content</label>
            <textarea id="contentInput" placeholder="Enter post content...&#10;&#10;Multi-line text supported as core dataset field."></textarea>
        </div>

        <!-- Publish Time (core feature) -->
        <div class="time-edit-section" id="timeEditSection">
            <div class="section-label">&#x23F0; Publish Time <span style="font-weight:400;font-size:0.75rem;color:#e67e22;">(Editable independently)</span></div>
            <div class="time-display" id="timeDisplay">Not set</div>
            <div class="time-edit-row">
                <input type="datetime-local" id="publishTimeInput">
                <button class="btn-set-time" id="btnSetTime" title="Update publish time only">Update</button>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="btnSave">&#x1F4BE; Publish Post</button>
            <button class="btn btn-outline" id="btnNew" style="display:none;">&#x2795; New</button>
        </div>

        <div class="btn-row" id="editActions" style="display:none;">
            <button class="btn btn-sm btn-danger" id="btnDelete">&#x1F5D1;&#xFE0F; Delete Post</button>
        </div>
    </aside>

</div>

<!-- Footer -->
<footer class="footer-bar">
    <div class="footer-info" id="footerInfo">&#x1F4A1; Tip: Publish time can be edited independently from post content</div>
    <div class="footer-actions">
        <button class="btn btn-sm btn-outline" id="btnExport">&#x1F4E5; Export Dataset (HTML)</button>
        <button class="btn btn-sm btn-outline" id="btnImport">&#x1F4E4; Import Dataset</button>
        <button class="btn btn-sm btn-danger" id="btnClearAll">&#x1F5D1;&#xFE0F; Clear All</button>
    </div>
    <input type="file" id="importFileInput" class="hidden-input" accept=".html,.htm">
</footer>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
(function() {
    'use strict';

    // ==================== Data Store ====================
    var STORAGE_KEY = 'post_dataset_tool_data';

    function loadPosts() {
        try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
        catch (e) { console.error('Failed to load data:', e); return []; }
    }

    function savePosts(posts) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); }
        catch (e) { showToast('Save failed: storage full. Please export and clear.', 'error'); }
    }

    function generateId() {
        return 'post_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
    }

    function formatTime(isoString) {
        if (!isoString) return 'Not set';
        try {
            var d = new Date(isoString);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var min = String(d.getMinutes()).padStart(2, '0');
            return y + '-' + m + '-' + day + ' ' + h + ':' + min;
        } catch (e) { return 'Invalid format'; }
    }

    function toDatetimeLocal(isoString) {
        if (!isoString) return '';
        try { return isoString.substring(0, 16); } catch (e) { return ''; }
    }

    function nowISO() {
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        var h = String(d.getHours()).padStart(2, '0');
        var min = String(d.getMinutes()).padStart(2, '0');
        return y + '-' + m + '-' + day + 'T' + h + ':' + min;
    }

    // ==================== State ====================
    var posts = loadPosts();
    var currentPostId = null;
    var currentFilter = '';
    var currentSort = 'newest';

    // ==================== DOM Refs ====================
    var $postList = document.getElementById('postList');
    var $searchInput = document.getElementById('searchInput');
    var $sortSelect = document.getElementById('sortSelect');
    var $titleInput = document.getElementById('titleInput');
    var $authorInput = document.getElementById('authorInput');
    var $contentInput = document.getElementById('contentInput');
    var $publishTimeInput = document.getElementById('publishTimeInput');
    var $timeDisplay = document.getElementById('timeDisplay');
    var $btnSave = document.getElementById('btnSave');
    var $btnNew = document.getElementById('btnNew');
    var $btnDelete = document.getElementById('btnDelete');
    var $btnSetTime = document.getElementById('btnSetTime');
    var $btnExport = document.getElementById('btnExport');
    var $btnImport = document.getElementById('btnImport');
    var $btnClearAll = document.getElementById('btnClearAll');
    var $importFileInput = document.getElementById('importFileInput');
    var $editActions = document.getElementById('editActions');
    var $panelTitle = document.getElementById('panelTitle');
    var $headerStats = document.getElementById('headerStats');
    var $footerInfo = document.getElementById('footerInfo');
    var $toastContainer = document.getElementById('toastContainer');

    // ==================== Toast ====================
    function showToast(msg, type) {
        type = type || '';
        var el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = msg;
        $toastContainer.appendChild(el);
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
    }

    // ==================== Render ====================
    function getFilteredAndSortedPosts() {
        var result = posts.slice();
        if (currentFilter.trim()) {
            var kw = currentFilter.trim().toLowerCase();
            result = result.filter(function(p) {
                return (p.title && p.title.toLowerCase().indexOf(kw) !== -1) ||
                       (p.author && p.author.toLowerCase().indexOf(kw) !== -1) ||
                       (p.content && p.content.toLowerCase().indexOf(kw) !== -1);
            });
        }
        if (currentSort === 'newest') {
            result.sort(function(a, b) { return (b.publishTime || '').localeCompare(a.publishTime || ''); });
        } else if (currentSort === 'oldest') {
            result.sort(function(a, b) { return (a.publishTime || '').localeCompare(b.publishTime || ''); });
        } else if (currentSort === 'created') {
            result.sort(function(a, b) { return (b.createdAt || '').localeCompare(a.createdAt || ''); });
        }
        return result;
    }

    function renderPostList() {
        var filtered = getFilteredAndSortedPosts();
        if (filtered.length === 0) {
            $postList.innerHTML = '<div class="empty-state"><span class="icon">&#x1F4DD;</span><h3>' +
                (posts.length === 0 ? 'No posts yet' : 'No matching posts') +
                '</h3><p>' +
                (posts.length === 0 ? 'Create your first post in the right panel' : 'Try a different search keyword') +
                '</p></div>';
        } else {
            var html = '';
            filtered.forEach(function(p) {
                var activeClass = (p.id === currentPostId) ? ' active' : '';
                html += '<div class="post-card' + activeClass + '" data-id="' + p.id + '" onclick="window._selectPost(\'' + p.id + '\')">';
                html += '<div class="post-card-header">';
                html += '<span class="post-card-title">' + escapeHtml(p.title || 'Untitled') + '</span>';
                html += '<span class="post-card-time">&#x1F555; ' + formatTime(p.publishTime) + '</span>';
                html += '</div>';
                html += '<div class="post-card-meta">';
                html += '<span>&#x270D;&#xFE0F; ' + escapeHtml(p.author || 'Anonymous') + '</span>';
                html += '<span>&#x1F4C5; Created: ' + formatTime(p.createdAt) + '</span>';
                html += '</div>';
                html += '<div class="post-card-preview">' + escapeHtml(truncateText(p.content, 80)) + '</div>';
                html += '</div>';
            });
            $postList.innerHTML = html;
        }
        updateStats();
    }

    function updateStats() {
        var filtered = getFilteredAndSortedPosts();
        $headerStats.textContent = posts.length + ' posts total' +
            (currentFilter ? ' (' + filtered.length + ' shown)' : '');
    }

    function loadPostToEditor(postId) {
        var post = null;
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === postId) { post = posts[i]; break; }
        }
        if (!post) return;
        currentPostId = post.id;
        $panelTitle.textContent = '&#x270F;&#xFE0F; Edit Post';
        $titleInput.value = post.title || '';
        $authorInput.value = post.author || '';
        $contentInput.value = post.content || '';
        $publishTimeInput.value = toDatetimeLocal(post.publishTime);
        $timeDisplay.textContent = formatTime(post.publishTime);
        $btnSave.textContent = '&#x1F4BE; Save Changes';
        $btnNew.style.display = 'inline-flex';
        $editActions.style.display = 'flex';
        $footerInfo.textContent = '&#x1F4DD; Editing: "' + truncateText(post.title, 30) + '" &mdash; use below to update publish time independently';
    }

    function resetEditor() {
        currentPostId = null;
        $panelTitle.textContent = '&#x270D;&#xFE0F; New Post';
        $titleInput.value = '';
        $authorInput.value = '';
        $contentInput.value = '';
        $publishTimeInput.value = toDatetimeLocal(nowISO());
        $timeDisplay.textContent = formatTime(nowISO());
        $btnSave.textContent = '&#x1F4BE; Publish Post';
        $btnNew.style.display = 'none';
        $editActions.style.display = 'none';
        $footerInfo.textContent = '&#x1F4A1; Tip: Publish time can be edited independently from post content';
    }

    // ==================== Actions ====================
    function saveOrUpdatePost() {
        var title = $titleInput.value.trim();
        var content = $contentInput.value.trim();

        if (!title) { showToast('Please enter a title', 'error'); $titleInput.focus(); return; }
        if (!content) { showToast('Please enter content', 'error'); $contentInput.focus(); return; }

        var publishTime = $publishTimeInput.value;
        if (!publishTime) { publishTime = nowISO(); $publishTimeInput.value = toDatetimeLocal(publishTime); }

        var now = nowISO();

        if (currentPostId) {
            for (var i = 0; i < posts.length; i++) {
                if (posts[i].id === currentPostId) {
                    posts[i].title = title;
                    posts[i].author = $authorInput.value.trim();
                    posts[i].content = content;
                    posts[i].publishTime = publishTime;
                    posts[i].updatedAt = now;
                    break;
                }
            }
            savePosts(posts);
            showToast('Post updated', 'success');
        } else {
            var newPost = {
                id: generateId(),
                title: title,
                author: $authorInput.value.trim(),
                content: content,
                publishTime: publishTime,
                createdAt: now,
                updatedAt: now
            };
            posts.push(newPost);
            savePosts(posts);
            currentPostId = newPost.id;
            showToast('Post published', 'success');
            loadPostToEditor(newPost.id);
        }
        renderPostList();
    }

    function updatePublishTimeOnly() {
        if (!currentPostId) {
            var newTime = $publishTimeInput.value;
            if (newTime) { $timeDisplay.textContent = formatTime(newTime); showToast('Publish time preset: ' + formatTime(newTime), 'success'); }
            return;
        }
        var newTime = $publishTimeInput.value;
        if (!newTime) { showToast('Please select a time', 'error'); return; }
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === currentPostId) {
                posts[i].publishTime = newTime;
                posts[i].updatedAt = nowISO();
                break;
            }
        }
        savePosts(posts);
        $timeDisplay.textContent = formatTime(newTime);
        renderPostList();
        showToast('Publish time updated: ' + formatTime(newTime), 'success');
    }

    function deletePost() {
        if (!currentPostId) return;
        var postTitle = '';
        for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === currentPostId) { postTitle = posts[i].title; break; }
        }
        showConfirm('Confirm Delete', 'Delete post "' + truncateText(postTitle, 40) + '"? This cannot be undone.', function() {
            posts = posts.filter(function(p) { return p.id !== currentPostId; });
            savePosts(posts);
            resetEditor();
            renderPostList();
            showToast('Post deleted', 'success');
        });
    }

    function clearAll() {
        showConfirm('Confirm Clear All', 'Delete all ' + posts.length + ' posts? Consider exporting first. This cannot be undone.', function() {
            posts = [];
            savePosts(posts);
            resetEditor();
            renderPostList();
            showToast('All posts cleared', 'success');
        });
    }

    // ==================== Confirm Modal ====================
    function showConfirm(title, message, onConfirm) {
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = '<div class="modal-box">' +
            '<h3>' + escapeHtml(title) + '</h3>' +
            '<p>' + escapeHtml(message) + '</p>' +
            '<div class="btn-row">' +
            '<button class="btn btn-outline btn-sm" id="modalCancel">Cancel</button>' +
            '<button class="btn btn-danger btn-sm" id="modalConfirm">Confirm</button>' +
            '</div></div>';
        document.body.appendChild(overlay);
        overlay.querySelector('#modalCancel').addEventListener('click', function() { document.body.removeChild(overlay); });
        overlay.querySelector('#modalConfirm').addEventListener('click', function() { document.body.removeChild(overlay); onConfirm(); });
        overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });
    }

    // ==================== Export ====================
    function exportDataset() {
        if (posts.length === 0) { showToast('No data to export', 'error'); return; }
        var now = new Date();
        var exportTime = now.toISOString();

        var postsHTML = '';
        posts.forEach(function(p) {
            postsHTML += '  <article data-id="' + escapeHtml(p.id) + '" data-publish-time="' + escapeHtml(p.publishTime) + '">\n';
            postsHTML += '    <header>\n';
            postsHTML += '      <h2 class="post-title">' + escapeHtml(p.title) + '</h2>\n';
            postsHTML += '      <div class="post-meta">\n';
            postsHTML += '        <span class="post-author">Author: ' + escapeHtml(p.author || 'Anonymous') + '</span>\n';
            postsHTML += '        <time datetime="' + escapeHtml(p.publishTime) + '">Publish Time: ' + formatTime(p.publishTime) + '</time>\n';
            postsHTML += '        <span class="post-created">Created: ' + formatTime(p.createdAt) + '</span>\n';
            postsHTML += '        <span class="post-updated">Updated: ' + formatTime(p.updatedAt) + '</span>\n';
            postsHTML += '      </div>\n';
            postsHTML += '    </header>\n';
            postsHTML += '    <div class="post-content">\n';
            postsHTML += escapeHtml(p.content).replace(/\n/g, '\n      <br>\n');
            postsHTML += '\n    </div>\n';
            postsHTML += '  </article>\n';
        });

        var datasetJSON = JSON.stringify(posts, null, 2);

        var html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n' +
            '<meta charset="UTF-8">\n' +
            '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
            '<title>Post Dataset</title>\n' +
            '<meta name="description" content="Post dataset - Exported: ' + formatTime(exportTime) + ' - ' + posts.length + ' posts">\n' +
            '<meta name="dataset-export-time" content="' + exportTime + '">\n' +
            '<meta name="dataset-post-count" content="' + posts.length + '">\n' +
            '<style>\n' +
            'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f9fafb; color: #2c3e50; line-height: 1.6; }\n' +
            'h1 { color: #4f6ef6; border-bottom: 3px solid #4f6ef6; padding-bottom: 12px; }\n' +
            '.dataset-info { background: #eef0fd; padding: 16px 20px; border-radius: 8px; margin-bottom: 30px; font-size: 0.9rem; color: #555; }\n' +
            'article { background: #fff; border: 1px solid #e1e5ea; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }\n' +
            'article h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #2c3e50; }\n' +
            '.post-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.82rem; color: #7f8c8d; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #eee; }\n' +
            '.post-meta time { color: #4f6ef6; font-weight: 600; }\n' +
            '.post-content { font-size: 0.95rem; white-space: pre-wrap; }\n' +
            'footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #ddd; font-size: 0.8rem; color: #999; text-align: center; }\n' +
            '</style>\n</head>\n<body>\n' +
            '<h1>&#x1F4CA; Post Dataset</h1>\n' +
            '<div class="dataset-info">\n' +
            '  <strong>Export Time:</strong> ' + formatTime(exportTime) + '<br>\n' +
            '  <strong>Total Posts:</strong> ' + posts.length + '<br>\n' +
            '  <strong>Format:</strong> Each post wrapped in &lt;article&gt;, publish time in &lt;time datetime="..."&gt;, with embedded JSON.\n' +
            '</div>\n<hr>\n\n' +
            postsHTML +
            '\n<hr>\n<footer>Generated by Post Dataset Manager | ' + formatTime(exportTime) + '</footer>\n\n' +
            '<!-- Embedded JSON for programmatic access -->\n' +
            '<script type="application/json" id="dataset-json">\n' +
            datasetJSON +
            '\n</' + 'script>\n</body>\n</html>';

        downloadFile('post-dataset_' + now.toISOString().replace(/[:.]/g, '-').substring(0, 16) + '.html', html);
        showToast('Dataset exported (' + posts.length + ' posts)', 'success');
    }

    function downloadFile(filename, content) {
        var blob = new Blob([content], { type: 'text/html;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ==================== Import ====================
    function importDataset(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var html = e.target.result;
            var jsonMatch = html.match(/<script\s+type=["']application\/json["'][^>]*id=["']dataset-json["'][^>]*>([\s\S]*?)<\/script>/i);
            if (jsonMatch) {
                try { var imported = JSON.parse(jsonMatch[1]); mergeImportedPosts(imported); return; }
                catch (err) { /* fallback */ }
            }
            var anyJsonMatch = html.match(/<script\s+type=["']application\/json["'][^>]*>([\s\S]*?)<\/script>/i);
            if (anyJsonMatch) {
                try { var imported2 = JSON.parse(anyJsonMatch[1]); mergeImportedPosts(imported2); return; }
                catch (err) { /* fallback */ }
            }
            try {
                var jsonLike = html.match(/\[\s*\{[\s\S]*\}\s*\]/);
                if (jsonLike) { var imported3 = JSON.parse(jsonLike[0]); mergeImportedPosts(imported3); return; }
            } catch (err) { /* give up */ }
            showToast('Import failed: No valid post data found in file', 'error');
        };
        reader.onerror = function() { showToast('File read failed', 'error'); };
        reader.readAsText(file);
    }

    function mergeImportedPosts(importedPosts) {
        if (!Array.isArray(importedPosts) || importedPosts.length === 0) {
            showToast('Import failed: Invalid or empty data', 'error'); return;
        }
        var addedCount = 0, skippedCount = 0;
        var existingIds = {};
        posts.forEach(function(p) { existingIds[p.id] = true; });
        importedPosts.forEach(function(p) {
            if (!p.id || !p.title) { skippedCount++; return; }
            if (existingIds[p.id]) { skippedCount++; return; }
            posts.push({
                id: p.id, title: p.title || '', author: p.author || '',
                content: p.content || '',
                publishTime: p.publishTime || p.createdAt || nowISO(),
                createdAt: p.createdAt || nowISO(), updatedAt: p.updatedAt || nowISO()
            });
            existingIds[p.id] = true;
            addedCount++;
        });
        savePosts(posts); renderPostList(); resetEditor();
        var msg = 'Import done: ' + addedCount + ' added';
        if (skippedCount > 0) msg += ', ' + skippedCount + ' skipped (duplicate or incomplete)';
        showToast(msg, 'success');
    }

    // ==================== Event Bindings ====================
    $searchInput.addEventListener('input', function() { currentFilter = $searchInput.value; renderPostList(); });
    $sortSelect.addEventListener('change', function() { currentSort = $sortSelect.value; renderPostList(); });
    $btnSave.addEventListener('click', saveOrUpdatePost);
    $btnNew.addEventListener('click', function() { resetEditor(); renderPostList(); });
    $btnDelete.addEventListener('click', deletePost);
    $btnSetTime.addEventListener('click', updatePublishTimeOnly);
    $publishTimeInput.addEventListener('change', function() {
        var val = $publishTimeInput.value;
        if (val) { $timeDisplay.textContent = formatTime(val); }
    });
    $btnExport.addEventListener('click', exportDataset);
    $btnImport.addEventListener('click', function() { $importFileInput.click(); });
    $importFileInput.addEventListener('change', function() {
        if ($importFileInput.files && $importFileInput.files[0]) {
            importDataset($importFileInput.files[0]);
            $importFileInput.value = '';
        }
    });
    $btnClearAll.addEventListener('click', clearAll);

    window._selectPost = function(postId) {
        if (currentPostId === postId) { currentPostId = null; resetEditor(); renderPostList(); return; }
        loadPostToEditor(postId);
        renderPostList();
    };

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveOrUpdatePost(); }
        if (e.key === 'Escape' && currentPostId) { resetEditor(); renderPostList(); showToast('Edit cancelled', ''); }
    });

    // ==================== Utils ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function truncateText(text, maxLen) {
        if (!text) return '(no content)';
        if (text.length <= maxLen) return text;
        return text.substring(0, maxLen) + '...';
    }

    // ==================== Init ====================
    function init() {
        $publishTimeInput.value = toDatetimeLocal(nowISO());
        $timeDisplay.textContent = formatTime(nowISO());
        renderPostList();
    }

    init();
    console.log('Post Dataset Manager ready');
    console.log('  - ' + posts.length + ' posts loaded');
    console.log('  - Data stored in localStorage: ' + STORAGE_KEY);
    console.log('  - Ctrl+S to save, Esc to cancel');
})();
</script>

</body>
