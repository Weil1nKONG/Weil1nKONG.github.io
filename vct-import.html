    "title": "TeamA Valorant: From Champions to Contenders",
    "slug": "teama-valorant-from-champions-to-contenders",
    "author": "Weilin",
    "group": "VCT",
    "content": "TeamA has established itself as the most significant force in Chinese Valorant since first entering the scene in 2020. The organization made history at Valorant Champions 2024 in Seoul, South Korea, where they defeated EMEA powerhouse Team Heretics 3‑2 in an epic grand final to become the first Chinese team ever to win an international VCT event. This victory marked a watershed moment not just for the organization, but for the entire CN region.\n\n\n\nThe grand final was a rollercoaster affair. Team Heretics took the first map Haven 13‑6, but TeamA responded with a dominant 13‑4 victory on Sunset to level the series. TeamA then secured a 2‑1 lead with a 13‑9 win on Lotus, only for Heretics to force a decider with a 13‑11 victory on Bind. On the final map Abyss, TeamA held their nerve, closing out the series to lift the trophy.\n\n\n\nTeamA’s triumph was powered by extraordinary individual performances. Star duelist TeamA Player 1 shattered the world record for most kills in a best‑of‑five series with 111 total kills across the five maps. He finished atop the leaderboard in three of the five maps and was awarded the first‑ever MVP trophy for Valorant Champions. Teammate TeamA Player 3 also delivered a masterclass on Lotus with 27 kills, while rookie TeamA Player 2 completed the &quot;royal road&quot; — winning Champions in his debut year after playing in Challengers League just three months prior.\n\n\n\nThe championship lineup featured TeamA Player 1, TeamA Player 3, TeamA Player 4, TeamA Player 5, and TeamA Player 2, coached by TeamA Coach. Since that historic victory, TeamA has continued to dominate domestically. In May 2026, they defeated XLG 3‑2 in the VCT CN Stage 1 finals to claim their ninth CN regional title — a record that underscores their sustained excellence. The core quartet of TeamA Player 1, TeamA Player 4, TeamA Player 5, and TeamA Player 3 have been present for all nine championships.\n\n\n\nAt VCT Masters London 2026, TeamA entered as the CN region&#39;s top seed. They secured a top‑three finish by defeating XLG 2‑1 in the upper bracket semifinal, with a dominant 13‑3 victory on the decider map Split. Their starting roster for the tournament featured TeamA Player 1, TeamA Player 3, TeamA Player 4, TeamA Player 5, and TeamA Player 6. TeamA’s journey from their early international appearances — a 32nd‑place finish at the 2023 Brazil Kickoff Invitational, followed by top‑six finishes at Tokyo Masters and Los Angeles Champions — to world champions in 2024 reflects a steady ascent built on resilience and growth.\n\n\n\nToday, TeamA remains the benchmark for Valorant excellence in China — the first team to break through on the global stage and a perennial contender who continues to push for more.",
    "pub_time": "2019-06-01T00:00"
  },
